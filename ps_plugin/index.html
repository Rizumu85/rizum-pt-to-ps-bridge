<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Rizum PT-to-PS Bridge</title>
    <script src="src/main.js"></script>
    <style>
      body {
        margin: 0;
        padding: 6px;
        min-height: 540px;
        color: #111;
        background: #fff;
        font-family: Arial, sans-serif;
        font-size: 12px;
        overflow: auto;
      }

      #rizum-bridge-panel {
        box-sizing: border-box;
        display: block;
        min-height: 520px;
        max-height: calc(100vh - 12px);
        padding: 10px;
        border: 3px solid #0057d8;
        background: #fff;
        color: #111;
        overflow: auto;
      }

      button {
        min-height: 30px;
        display: block;
        width: 100%;
        margin: 0 0 10px;
        color: #111;
      }

      input {
        box-sizing: border-box;
        min-height: 30px;
        display: block;
        width: 100%;
        margin: 0 0 10px;
        padding: 5px 7px;
        color: #111;
        background: #fff;
        border: 1px solid #777;
      }

      #rizum-status {
        margin: 0;
        font-weight: 700;
      }

      #rizum-details {
        min-height: 90px;
        max-height: 360px;
        width: 100%;
        box-sizing: border-box;
        margin: 0;
        padding: 8px;
        white-space: pre-wrap;
        overflow: auto;
        word-break: break-word;
        border: 1px solid #777;
        background: #fff;
        color: #111;
        resize: vertical;
        font-family: Consolas, monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <section id="rizum-bridge-panel">
      <button id="rizum-build-button" type="button">Build from Painter</button>
      <button id="rizum-export-applied-button" type="button">Export Selected (Applied Mask)</button>
      <button id="rizum-export-separate-button" type="button">Export Selected + Masks</button>
      <button id="rizum-copy-button" type="button">Copy Details</button>
      <p id="rizum-status">Rizum HTML runtime loaded</p>
      <input id="rizum-request-path" type="text" placeholder="Paste build_request.json path">
      <button id="rizum-paste-path-button" type="button">Paste Request Path</button>
      <button id="rizum-build-path-button" type="button">Build Request Path</button>
      <button id="rizum-build-folder-button" type="button">Build Request Folder</button>
      <button id="rizum-build-list-button" type="button">Build Export List</button>
      <textarea id="rizum-details" readonly spellcheck="false">Rizum PT Bridge 0.1.59
Build from Painter creates a PSD. Export Selected writes Photoshop layers as PNGs for manual Painter import.</textarea>
    </section>
  </body>
</html>
